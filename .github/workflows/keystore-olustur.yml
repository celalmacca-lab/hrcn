name: Keystore Oluştur

# Bu workflow SADECE BİR KEZ çalıştırılır — imza anahtarını (keystore) üretir.
# Çalıştırdıktan sonra artifact'i indir, base64 içeriğini GitHub Secret'a ekle,
# sonra bu dosyayı repodan silebilirsin.

on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Keystore üret
        run: |
          keytool -genkeypair -v \
            -keystore harcana.keystore \
            -alias harcana \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "gv4iFT6JOvqaHBw4wni8nw58" \
            -keypass "l3ObwUhQK8rzLN8s5OD33NsR" \
            -dname "CN=Harcana, OU=Mobile, O=Harcana, L=Izmir, ST=Izmir, C=TR"

      - name: Keystore'u base64'e çevir (Secret'a yapıştırmak için)
        run: |
          base64 -w 0 harcana.keystore > harcana.keystore.base64
          echo "=== KEYSTORE BASE64 (asagidaki uzun metni KEYSTORE_BASE64 secret'ina koyacaksin) ==="
          echo ""
          cat harcana.keystore.base64
          echo ""
          echo "=== BASE64 SONU ==="

      - name: Keystore dosyalarını artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: harcana-keystore
          path: |
            harcana.keystore
            harcana.keystore.base64
          retention-days: 1
