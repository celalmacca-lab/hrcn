name: APK Derle

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Node 20 kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Bağımlılıkları yükle
        run: npm install

      - name: Kütüphaneleri offline gömle
        run: npm run vendor || echo "vendor atlandı (CDN'e düşülecek)"

      - name: Android platformunu ekle
        run: npx cap add android

      - name: İkon ve splash üret
        run: npx capacitor-assets generate --android --iconBackgroundColor '#070811' --splashBackgroundColor '#070811' || echo "varsayilan ikon kullanilacak"

      - name: Web varlıklarını senkronla
        run: npx cap sync android

      - name: APK derle (debug - telefona kurulabilir)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK'yı yükle
        uses: actions/upload-artifact@v4
        with:
          name: harcana-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
