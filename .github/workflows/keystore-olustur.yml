name: Keystore Oluştur
 
on:
  workflow_dispatch:
 
jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
 
      - name: Keystore üret (tek şifre - store ve key aynı)
        run: |
          keytool -genkeypair -v \
            -keystore harcana.keystore \
            -alias harcana \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "gDqIIBlxPSMt8nI7dRfrOyyY" \
            -keypass "gDqIIBlxPSMt8nI7dRfrOyyY" \
            -dname "CN=Harcana, OU=Mobile, O=Harcana, L=Izmir, ST=Izmir, C=TR"
 
      - name: Keystore'u base64'e çevir
        run: |
          base64 -w 0 harcana.keystore > harcana.keystore.base64
          echo "=== KEYSTORE BASE64 BASLANGIC ==="
          echo ""
          cat harcana.keystore.base64
          echo ""
          echo "=== KEYSTORE BASE64 SONU ==="
 
      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: harcana-keystore
          path: harcana.keystore
          retention-days: 1
 
