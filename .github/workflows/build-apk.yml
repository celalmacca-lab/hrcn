name: APK Derle
 
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4
 
      - name: Node 20 kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
 
      - name: Android SDK kur
        uses: android-actions/setup-android@v3
 
      - name: Bağımlılıkları yükle
        run: npm install
 
      - name: Kütüphaneleri offline gömle
        run: npm run vendor || echo "vendor atlandı (CDN'e düşülecek)"
 
      - name: Android platformunu ekle
        run: npx cap add android
 
      - name: Hedef SDK 36 yap
        run: bash scripts/patch_android.sh || echo "SDK yaması atlandı"
 
      - name: İkon ve splash üret
        run: npx capacitor-assets generate --android --iconBackgroundColor '#070811' --splashBackgroundColor '#070811' || echo "varsayilan ikon"
 
      - name: Ana ekran widget'ını enjekte et
        run: bash scripts/patch_widget.sh || echo "widget atlandı"
 
      - name: Web varlıklarını senkronla
        run: npx cap sync android
 
      - name: APK derle (debug - test için)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
 
      - name: AAB derle (release - imzasız)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace
 
      - name: Keystore'u secret'tan çöz
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/harcana.keystore"
          echo "Keystore boyutu: $(stat -c%s $RUNNER_TEMP/harcana.keystore) byte"
 
      - name: AAB'yi jarsigner ile imzala (tek şifre)
        run: |
          jarsigner -verbose \
            -keystore "$RUNNER_TEMP/harcana.keystore" \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            -keypass "${{ secrets.STORE_PASSWORD }}" \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            android/app/build/outputs/bundle/release/app-release.aab \
            harcana
 
      - name: İmzayı doğrula
        run: |
          jarsigner -verify android/app/build/outputs/bundle/release/app-release.aab && echo "IMZA GECERLI"
          cd android/app/build/outputs/bundle/release
          mv app-release.aab harcana-release-imzali.aab
          echo "Imzali AAB: $(stat -c%s harcana-release-imzali.aab) byte"
 
      - name: APK'yı yükle
        uses: actions/upload-artifact@v4
        with:
          name: harcana-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
 
      - name: İMZALI AAB'yi yükle
        uses: actions/upload-artifact@v4
        with:
          name: harcana-aab-IMZALI
          path: android/app/build/outputs/bundle/release/harcana-release-imzali.aab
          if-no-files-found: error
