<!DOCTYPE html>
<html lang="tr">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

<title>Harcana — Akıllı Harcama Takibi</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harcana">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script>
/* Akıllı kütüphane yükleyici: render'ı BLOKE ETMEZ. Önce yerel (lib/) dener,
   bulamazsa CDN'e düşer. APK'da lib/ dosyaları gömülüdür → hiç uzak sunucuya gidilmez,
   sonsuz "yükleniyor" olmaz. Tarayıcıda (online) yerel yoksa CDN'den çeker. */
(function(){
  var L=[
    ['lib/chart.umd.min.js','https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js'],
    ['lib/xlsx.full.min.js','https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'],
    ['lib/peerjs.min.js','https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js'],
    ['lib/qrcode.js','https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js']
  ];
  var i=0;
  function done(){ if(i>=L.length){ window.__libsReady=true; if(window.__bootApp)window.__bootApp(); return; } var p=L[i++]; one(p[0],p[1]); }
  function one(local,cdn){
    var s=document.createElement('script'); s.src=local; s.async=false;
    s.onload=done;
    s.onerror=function(){ var c=document.createElement('script'); c.src=cdn; c.async=false; c.onload=done; c.onerror=done; document.head.appendChild(c); };
    document.head.appendChild(s);
  }
  done();
})();
</script>
<style>
:root{
  --bg:#070811; --bg2:#0B0E1A;
  --blob1:#3a2d7a; --blob2:#0d5a52; --blob3:#7a5a1e;
  --card:rgba(255,255,255,.055); --card-2:rgba(255,255,255,.085);
  --border:rgba(255,255,255,.10); --border-strong:rgba(255,255,255,.20);
  --text:#EEF1F8; --dim:#9AA3B7; --faint:#5F6880;
  --primary:#7C8FFF; --primary-2:#B07CFF;
  --gold:#E9C46A; --gold-2:#F4D58D;
  --pos:#3DDC97; --neg:#FB7185; --warn:#FBBF24; --info:#56C8F5;
  --shadow:0 24px 70px -28px rgba(0,0,0,.85);
  --shadow-soft:0 8px 30px -12px rgba(0,0,0,.5);
  --radius:22px; --radius-sm:15px;
  --grad:linear-gradient(135deg,#7C8FFF 0%,#B07CFF 48%,#3DDC97 120%);
  --grad-gold:linear-gradient(135deg,#F4D58D 0%,#E9C46A 50%,#C99A3A 100%);
  --glass-hi:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,0) 42%);
}
:root.light{
  --bg:#EEF1FA; --bg2:#E4E9F4;
  --blob1:#c2c9ff; --blob2:#a9e6d6; --blob3:#f0dca6;
  --card:rgba(255,255,255,.74); --card-2:rgba(255,255,255,.92);
  --border:rgba(15,23,42,.08); --border-strong:rgba(15,23,42,.16);
  --text:#0E1320; --dim:#516079; --faint:#8A93A8;
  --primary:#4F6BF6; --primary-2:#8A5CF6;
  --gold:#B8860B; --gold-2:#C99A3A;
  --pos:#0EA371; --neg:#E1495F; --warn:#C77E00; --info:#0C8FD0;
  --shadow:0 24px 60px -30px rgba(20,30,60,.42);
  --shadow-soft:0 10px 30px -16px rgba(20,30,60,.28);
  --glass-hi:linear-gradient(180deg,rgba(255,255,255,.65),rgba(255,255,255,0) 50%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:
    radial-gradient(1200px 700px at 12% -8%, color-mix(in srgb,var(--blob1) 30%,transparent), transparent 60%),
    radial-gradient(1000px 800px at 100% 110%, color-mix(in srgb,var(--blob2) 26%,transparent), transparent 60%),
    linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
  background-attachment:fixed;
  color:var(--text);
  -webkit-font-smoothing:antialiased; font-feature-settings:"cv01","ss01"; line-height:1.45;
  overflow-x:hidden;
}
body::before,body::after{
  content:"";position:fixed;border-radius:50%;filter:blur(100px);z-index:-1;opacity:.5;
  transition:background .4s, opacity .4s;
}
body::before{width:600px;height:600px;background:var(--blob1);top:-200px;left:-140px}
body::after{width:560px;height:560px;background:var(--blob3);bottom:-240px;right:-160px;opacity:.32}
h1,h2,h3,h4,.display{font-family:'Sora','Inter',sans-serif;letter-spacing:-.02em}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:inherit}
::-webkit-scrollbar{height:8px;width:8px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px}

/* ---------- Layout ---------- */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{
  position:sticky;top:0;height:100vh;padding:22px 16px;
  display:flex;flex-direction:column;gap:6px;
  border-right:1px solid var(--border);background:linear-gradient(180deg,var(--bg2),transparent);
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 10px 18px}
.brand .logo{width:40px;height:40px;border-radius:13px;background:var(--grad);display:grid;place-items:center;box-shadow:0 10px 26px -8px var(--primary), inset 0 1px 0 rgba(255,255,255,.4);position:relative;overflow:hidden}
.brand .logo::after{content:"";position:absolute;inset:0;background:var(--glass-hi)}
.brand .logo svg{width:21px;height:21px;color:#fff;position:relative;z-index:1}
.brand h1{font-size:19px;font-weight:800;letter-spacing:-.03em;background:linear-gradient(120deg,var(--text),var(--dim));-webkit-background-clip:text;background-clip:text}
.brand span{font-size:10.5px;color:var(--gold);font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.nav{display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:13px;
  color:var(--dim);font-weight:600;font-size:14.5px;transition:.18s;position:relative;text-align:left;width:100%;
}
.nav-item svg{width:19px;height:19px;flex-shrink:0}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:linear-gradient(100deg,color-mix(in srgb,var(--primary) 16%,transparent),var(--card-2));color:var(--text);box-shadow:inset 0 0 0 1px var(--border-strong)}
.nav-item.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:3px;background:var(--grad);box-shadow:0 0 12px var(--primary)}
.nav-item .badge{margin-left:auto;font-size:11px;font-weight:700;background:var(--neg);color:#fff;border-radius:20px;padding:1px 7px;min-width:18px;text-align:center}
.theme-toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 13px;border-radius:13px;background:var(--card);font-size:13.5px;font-weight:600;color:var(--dim);margin-top:6px}
.switch{width:42px;height:24px;border-radius:20px;background:var(--border-strong);position:relative;transition:.2s;flex-shrink:0}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.3)}
:root.light .switch{background:var(--primary)}
:root.light .switch::after{transform:translateX(18px)}

.main{padding:26px 30px 110px;max-width:1280px;width:100%}
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.topbar .title{font-size:25px;font-weight:800;letter-spacing:-.025em}
.topbar .sub{font-size:13px;color:var(--faint);font-weight:500;margin-top:1px}
.spacer{flex:1}
.search-box{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:9px 13px;min-width:210px}
.search-box svg{width:16px;height:16px;color:var(--faint)}
.search-box input{background:none;border:none;outline:none;color:var(--text);width:100%}
.search-box input::placeholder{color:var(--faint)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:13px;font-weight:650;font-size:14px;transition:.16s;white-space:nowrap}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 12px 30px -12px var(--primary), inset 0 1px 0 rgba(255,255,255,.35);position:relative}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 16px 36px -12px var(--primary), inset 0 1px 0 rgba(255,255,255,.4)}
.btn-primary:hover{filter:brightness(1.07);transform:translateY(-1px)}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--card-2);border-color:var(--border-strong)}
.btn-sm{padding:7px 11px;font-size:13px;border-radius:10px}

/* ---------- Cards ---------- */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);box-shadow:var(--shadow);position:relative}
.card::before{content:"";position:absolute;inset:0;border-radius:inherit;background:var(--glass-hi);pointer-events:none;opacity:.7}
.card>*{position:relative}
.grid{display:grid;gap:16px}
.stat-grid{grid-template-columns:repeat(auto-fill,minmax(215px,1fr))}
.stat{padding:18px 18px 16px;position:relative;overflow:hidden}
.stat .icon{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;margin-bottom:13px}
.stat .icon svg{width:19px;height:19px}
.stat .label{font-size:12.5px;color:var(--dim);font-weight:600;letter-spacing:.01em}
.stat .value{font-family:'Sora','Inter',sans-serif;font-size:25px;font-weight:800;letter-spacing:-.035em;margin-top:3px;font-variant-numeric:tabular-nums}
.stat .meta{font-size:12px;font-weight:600;margin-top:5px;color:var(--faint);display:flex;align-items:center;gap:5px}
.stat.hero{background:var(--grad);color:#fff;border:none}
.stat.hero .label,.stat.hero .meta{color:rgba(255,255,255,.85)}
.stat.hero .icon{background:rgba(255,255,255,.2)}
.up{color:var(--pos)} .down{color:var(--neg)}
.tint-pos{background:color-mix(in srgb,var(--pos) 16%,transparent);color:var(--pos)}
.tint-neg{background:color-mix(in srgb,var(--neg) 16%,transparent);color:var(--neg)}
.tint-pri{background:color-mix(in srgb,var(--primary) 18%,transparent);color:var(--primary)}
.tint-warn{background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn)}
.tint-info{background:color-mix(in srgb,var(--info) 18%,transparent);color:var(--info)}

.section{margin-top:22px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.section-head h3{font-size:16px;font-weight:750;letter-spacing:-.01em}
.section-head .count{font-size:12px;color:var(--faint);font-weight:600;background:var(--card);padding:2px 9px;border-radius:20px;border:1px solid var(--border)}

.panels{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
.chart-card{padding:18px 20px 14px}
.chart-card h4{font-size:14.5px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.chart-wrap{position:relative;height:260px}
.chart-wrap.tall{height:300px}

/* ---------- Lists / tables ---------- */
.list{display:flex;flex-direction:column}
.row{display:flex;align-items:center;gap:13px;padding:13px 18px;border-top:1px solid var(--border)}
.row:first-child{border-top:none}
.row .av{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;font-size:18px;font-weight:700}
.row .rmain{flex:1;min-width:0}
.row .rtitle{font-weight:650;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .rsub{font-size:12.5px;color:var(--faint);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.row .ramt{font-weight:750;font-size:15px;white-space:nowrap}
.row .actions{display:flex;gap:5px;opacity:0;transition:.15s}
.row:hover .actions{opacity:1}
.icon-btn{width:31px;height:31px;border-radius:9px;display:grid;place-items:center;background:var(--card-2);color:var(--dim);transition:.15s}
.icon-btn:hover{background:var(--border-strong);color:var(--text)}
.icon-btn svg{width:15px;height:15px}
.chip{font-size:11.5px;font-weight:600;padding:2px 8px;border-radius:8px;background:var(--card-2);color:var(--dim);border:1px solid var(--border)}
.pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}

.empty{text-align:center;padding:48px 20px;color:var(--faint)}
.empty svg{width:44px;height:44px;margin-bottom:12px;opacity:.5}
.empty p{font-size:14px;font-weight:600;color:var(--dim)}
.empty span{font-size:13px}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.seg{display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:3px;gap:2px}
.seg button{padding:7px 13px;border-radius:9px;font-size:13px;font-weight:600;color:var(--dim);transition:.15s}
.seg button.active{background:var(--card-2);color:var(--text);box-shadow:inset 0 0 0 1px var(--border)}
.filter-sel{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:8px 12px;color:var(--text);outline:none;font-weight:600}

/* progress */
.bar{height:8px;border-radius:8px;background:var(--card-2);overflow:hidden;margin-top:8px}
.bar > i{display:block;height:100%;border-radius:8px;background:var(--grad);transition:width .5s}
.bar.warn > i{background:linear-gradient(90deg,var(--warn),var(--neg))}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,7,12,.62);backdrop-filter:blur(6px);z-index:60;display:none;align-items:center;justify-content:center;padding:18px;animation:fade .2s}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border-strong);border-radius:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.6);animation:pop .22s}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 14px;position:sticky;top:0;background:var(--bg2);z-index:2}
.modal-head h3{font-size:18px;font-weight:750}
.modal-body{padding:4px 22px 22px}
.modal-foot{display:flex;gap:10px;padding:0 22px 22px}
.modal-foot .btn{flex:1;justify-content:center}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:650;color:var(--dim);margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:11px 13px;color:var(--text);outline:none;transition:.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);background:var(--card-2)}
.field textarea{resize:vertical;min-height:64px}
.field .hint{font-size:11.5px;color:var(--faint);margin-top:5px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.check{display:flex;align-items:center;gap:9px;cursor:pointer;font-weight:600;font-size:14px;padding:9px 0}
.check input{width:auto}
.tagbox{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tagbox .t{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--card-2);border:1px solid var(--border);cursor:pointer}
.tagbox .t.on{background:var(--grad);color:#fff;border:none}

/* toast */
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--bg2);border:1px solid var(--border-strong);border-radius:13px;padding:12px 18px;font-size:14px;font-weight:600;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;animation:pop .2s}
.toast svg{width:18px;height:18px}

/* mobile nav */
.mobile-bar{display:none}
.mobile-top{display:none}

/* ---------- New feature styles ---------- */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--border-strong);border-top-color:var(--primary);animation:spin .8s linear infinite;margin:0 auto}
.ai-load{text-align:center;padding:26px 10px}
.ai-load p{margin-top:14px;font-size:13.5px;color:var(--dim)}
.ai-quote{display:flex;gap:12px;padding:16px;border-radius:var(--radius-sm);background:var(--card-2);border:1px solid var(--border)}
.ai-quote svg{width:20px;height:20px;color:var(--primary);flex-shrink:0;margin-top:2px}
.ai-quote p{font-size:15px;line-height:1.55;font-weight:500}
.qr-box{background:#fff;border-radius:16px;padding:14px;width:188px;height:188px;margin:4px auto 16px;display:grid;place-items:center}
.qr-box svg{width:100%;height:100%;display:block}
.sync-codes{display:flex;gap:10px}
.sync-codes>div{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;text-align:center}
.sync-codes span{display:block;font-size:11px;color:var(--faint);font-weight:600;margin-bottom:3px}
.sync-codes b{font-size:16px;letter-spacing:.04em;word-break:break-all}
.sync-state{margin-top:14px;padding:11px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);font-size:13.5px;font-weight:600;color:var(--dim);text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}
.sync-state svg{width:17px;height:17px}
.sync-state.ok{color:var(--pos);border-color:color-mix(in srgb,var(--pos) 40%,var(--border))}
.sync-state.err{color:var(--neg);border-color:color-mix(in srgb,var(--neg) 40%,var(--border))}
.buy-head{text-align:center;margin-bottom:14px}
.buy-amt{font-size:32px;font-weight:800;letter-spacing:-.03em}
.buy-label{font-size:13px;color:var(--faint);font-weight:600}
.verdict{display:flex;gap:12px;align-items:center;padding:14px 16px;border-radius:var(--radius-sm);margin-bottom:14px}
.verdict p{font-size:14px;line-height:1.5;font-weight:600}
.buy-stats{display:flex;gap:8px}
.buy-stats>div{flex:1;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 6px}
.buy-stats span{display:block;font-size:11px;color:var(--faint);font-weight:600;margin-bottom:3px}
.buy-stats b{font-size:16px;font-weight:800}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.badge{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 12px;text-align:center;backdrop-filter:blur(14px)}
.badge-ic{font-size:34px;line-height:1;margin-bottom:8px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.25))}
.badge-t{font-size:13px;font-weight:700}
.badge-d{font-size:11px;color:var(--faint);margin-top:2px}
.ch-card{transition:.16s}
.ch-card:hover{border-color:var(--border-strong);transform:translateY(-2px)}

@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.view{animation:fade .25s}

@media(max-width:880px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:0 16px 96px}
  .panels{grid-template-columns:1fr}
  .mobile-top{
    display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:40;
    padding:14px 4px 12px;margin-bottom:6px;background:linear-gradient(180deg,var(--bg) 70%,transparent);backdrop-filter:blur(8px);
  }
  .mobile-top .logo{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center}
  .mobile-top .logo svg{width:19px;height:19px;color:#fff}
  .mobile-top h1{font-size:17px;font-weight:800;flex:1}
  .topbar{margin:8px 0 18px}
  .topbar .title{font-size:21px}
  .field-row{grid-template-columns:1fr}
  .mobile-bar{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:var(--bg2);border-top:1px solid var(--border);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));overflow-x:auto;gap:2px;
  }
  .mobile-bar button{
    flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;

function svg(name,extra=''){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ${extra}>${ICON[name]||''}</svg>`;}
function svgFill(name){return `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none">${ICON[name]||''}</svg>`;}

/* ---------- Storage layer ---------- */
const KEY='finance:v1';
const mem={}; // last-resort fallback
async function sGet(k){
  try{ const r=localStorage.getItem(k); if(r!==null) return r; }catch(e){}
  try{ if(window.storage){const r=await window.storage.get(k);return r?r.value:null;} }catch(e){}
  return mem[k]!==undefined?mem[k]:null;
}
async function sSet(k,v){
  mem[k]=v;
  try{ localStorage.setItem(k,v); return; }catch(e){}
  try{ if(window.storage){await window.storage.set(k,v);} }catch(e){}
}

/* ---------- State ---------- */
let state={
  meta:{currency:'TRY',theme:'dark',name:'',lastRecurRun:'',aiMode:'local'},
  incomes:[], expenses:[], subscriptions:[],
  debts:[], investments:[], goals:[], budgets:[], tags:['İş','Ev','Tatil','Sağlık','Çocuk'],
  challenges:[], badges:[]
};
let saveTimer=null;
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{await sSet(KEY,JSON.stringify(state));},250);}
async function load(){
  const raw=await sGet(KEY);
  if(raw){try{const d=JSON.parse(raw);state=Object.assign(state,d);state.meta=Object.assign({currency:'TRY',theme:'dark',name:'',lastRecurRun:'',aiMode:'local'},d.meta||{});}catch(e){}}
  if(!Array.isArray(state.challenges))state.challenges=[];
  if(!Array.isArray(state.badges))state.badges=[];
}

/* ---------- Utils ---------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const nowTime=()=>{const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
const monthOf=s=>(s||'').slice(0,7);
const curMonth=()=>todayStr().slice(0,7);
function fmt(n){
  const v=Number(n)||0;
  try{return new Intl.NumberFormat('tr-TR',{style:'currency',currency:state.meta.currency,maximumFractionDigits:v%1===0?0:2}).format(v);}
  catch(e){return v.toLocaleString('tr-TR')+' '+state.meta.currency;}
}
function fmtShort(n){const v=Number(n)||0;const a=Math.abs(v);let s;
  if(a>=1e6)s=(v/1e6).toFixed(1).replace('.0','')+'M';
  else if(a>=1e3)s=(v/1e3).toFixed(1).replace('.0','')+'B';
  else s=Math.round(v).toString();
  return s;
}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return `${d}.${m}.${y}`;}
function daysUntil(s){if(!s)return null;const t=new Date(s+'T00:00:00');const n=new Date();n.setHours(0,0,0,0);return Math.round((t-n)/864e5);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function sum(arr,f){return arr.reduce((a,x)=>a+(Number(f(x))||0),0);}
function toast(msg,kind='ok'){
  const w=document.getElementById('toasts');
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<span class="${kind==='ok'?'up':'down'}">${svg(kind==='ok'?'check':'x')}</span>${esc(msg)}`;
  w.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='.3s';setTimeout(()=>t.remove(),300);},2400);
}

const VIEWS=[

let activeView='panel';
let charts={};

/* ---------- Derived metrics ---------- */
function metrics(){
  const m=curMonth();
  const totIn=sum(state.incomes,x=>x.amount);
  const totOut=sum(state.expenses,x=>x.amount);
  const mIn=sum(state.incomes.filter(x=>monthOf(x.date)===m),x=>x.amount);
  const mOut=sum(state.expenses.filter(x=>monthOf(x.date)===m),x=>x.amount);
  const invest=sum(state.investments,x=>x.currentValue);
  const investCost=sum(state.investments,x=>x.buyPrice*x.amount);
  const debtOwe=sum(state.debts.filter(d=>d.kind==='borc'),d=>Math.max(0,d.amount-(d.paid||0)));
  const debtOwed=sum(state.debts.filter(d=>d.kind==='alacak'),d=>Math.max(0,d.amount-(d.paid||0)));
  const balance=totIn-totOut;
  const netWorth=balance+invest+debtOwed-debtOwe;
  const saving=mIn-mOut;
  const savingRate=mIn>0?(saving/mIn*100):0;
  return{totIn,totOut,mIn,mOut,invest,investCost,debtOwe,debtOwed,balance,netWorth,saving,savingRate};
}

/* upcoming payments (subs + debts) within 14 days */
function upcoming(){
  const items=[];
  state.subscriptions.forEach(s=>{const d=daysUntil(s.renewDate);if(d!==null&&d>=0&&d<=30)items.push({type:'Abonelik',name:s.name,amount:s.amount,date:s.renewDate,days:d,emoji:'🔁'});});
  state.debts.filter(d=>d.kind==='borc'&&(d.amount-(d.paid||0))>0).forEach(d=>{const dd=daysUntil(d.dueDate);if(dd!==null&&dd<=30)items.push({type:'Borç',name:d.person,amount:d.amount-(d.paid||0),date:d.dueDate,days:dd,emoji:'💸'});});
  return items.sort((a,b)=>a.days-b.days);
}

/* ---------- Recurring helpers ---------- */
const RECUR_LABELS={Yok:'none',Haftalık:'weekly','Aylık':'monthly','Yıllık':'yearly'};
const RECUR_TR={none:'Yok',weekly:'Haftalık',monthly:'Aylık',yearly:'Yıllık'};
function addInterval(dateStr,kind){
  const d=new Date(dateStr+'T00:00:00');
  if(kind==='weekly')d.setDate(d.getDate()+7);
  else if(kind==='monthly')d.setMonth(d.getMonth()+1);
  else if(kind==='yearly')d.setFullYear(d.getFullYear()+1);
  else return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ---------- Live price ticker mapping ---------- */
let LIVE_PRICES=null;        // {USD:.., EUR:.., BTC:.., ...} in app currency
let LIVE_AT=null;
function tickerFor(inv){
  if(inv.ticker&&inv.ticker!=='(otomatik)')return inv.ticker;
  const t=inv.type||'';
  if(/Dolar/.test(t))return'USD';
  if(/Euro/.test(t))return'EUR';
  if(/Sterlin/.test(t))return'GBP';
  if(/Gram Altın/.test(t))return'XAU';
  if(/Kripto/.test(t))return inv.ticker||'BTC';
  return null;
}
/* ===================== Generic Modal / Form ===================== */
const overlay=()=>document.getElementById('overlay');
function closeModal(){overlay().classList.remove('open');overlay().innerHTML='';}
overlayClickInit();
function overlayClickInit(){document.addEventListener('click',e=>{if(e.target===overlay())closeModal();});}

function buildField(f,val){
  const v=val!==undefined&&val!==null?val:(f.default!==undefined?f.default:'');
  let inner='';
  if(f.type==='select'){
    inner=`<select data-k="${f.key}">${f.options.map(o=>`<option value="${esc(o)}" ${String(v)===String(o)?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
  }else if(f.type==='textarea'){
    inner=`<textarea data-k="${f.key}" placeholder="${esc(f.placeholder||'')}">${esc(v)}</textarea>`;
  }else if(f.type==='checkbox'){
    return `<label class="check"><input type="checkbox" data-k="${f.key}" ${v?'checked':''}><span>${esc(f.label)}</span></label>`;
  }else if(f.type==='tags'){
    const sel=Array.isArray(v)?v:[];
    inner=`<div class="tagbox" data-k="${f.key}">${state.tags.map(t=>`<span class="t ${sel.includes(t)?'on':''}" data-t="${esc(t)}">${esc(t)}</span>`).join('')}</div>`;
    return `<div class="field"><label>${esc(f.label)}</label>${inner}</div>`;
  }else{
    const step=f.type==='number'?'step="any"':'';
    inner=`<input type="${f.type||'text'}" data-k="${f.key}" value="${esc(v)}" placeholder="${esc(f.placeholder||'')}" ${step}>`;
  }
  return `<div class="field" style="${f.half?'':''}"><label>${esc(f.label)}${f.required?' *':''}</label>${inner}${f.hint?`<div class="hint">${esc(f.hint)}</div>`:''}</div>`;
}

function openForm({title,fields,record,onSave,saveLabel='Kaydet',extras=[]}){
  const rows=[];let i=0;
  while(i<fields.length){
    const f=fields[i];
    if(f.half&&fields[i+1]&&fields[i+1].half){
      rows.push(`<div class="field-row">${buildField(f,record?.[f.key]).replace('class="field"','class="field" style="margin:0"')}${buildField(fields[i+1],record?.[fields[i+1].key]).replace('class="field"','class="field" style="margin:0"')}</div>`);
      i+=2;
    }else{rows.push(buildField(f,record?.[f.key]));i++;}
  }
  const readValues=()=>{
    const out={};
    overlay().querySelectorAll('[data-k]').forEach(el=>{
      const k=el.getAttribute('data-k');
      if(el.classList.contains('tagbox')){out[k]=[...el.querySelectorAll('.t.on')].map(t=>t.getAttribute('data-t'));return;}
      if(el.type==='checkbox'){out[k]=el.checked;return;}
      let val=el.value;const fld=fields.find(f=>f.key===k);
      if(fld&&fld.type==='number')val=val===''?'':parseFloat(val);
      out[k]=val;
    });
    return out;
  };
  const extrasHtml=extras.length?`<div style="display:flex;gap:8px;margin:2px 0 4px">${extras.map((e,idx)=>`<button class="btn ${e.cls||'btn-ghost'} btn-sm" data-extra="${idx}" style="flex:1;justify-content:center">${esc(e.label)}</button>`).join('')}</div>`:'';
  overlay().innerHTML=`<div class="modal"><div class="modal-head"><h3>${esc(title)}</h3><button class="icon-btn" id="mClose">${svg('x')}</button></div>
    <div class="modal-body">${rows.join('')}${extrasHtml}</div>
    <div class="modal-foot"><button class="btn btn-ghost" id="mCancel">İptal</button><button class="btn btn-primary" id="mSave">${esc(saveLabel)}</button></div></div>`;
  overlay().classList.add('open');
  document.getElementById('mClose').onclick=closeModal;
  document.getElementById('mCancel').onclick=closeModal;
  overlay().querySelectorAll('.tagbox .t').forEach(el=>el.onclick=()=>el.classList.toggle('on'));
  overlay().querySelectorAll('[data-extra]').forEach(b=>b.onclick=()=>{const e=extras[+b.getAttribute('data-extra')];if(e&&e.onClick)e.onClick(readValues);});
  document.getElementById('mSave').onclick=()=>{
    const out=readValues();let ok=true;
    for(const f of fields){if(f.required&&(out[f.key]===''||out[f.key]==null)){toast(f.label+' gerekli','err');ok=false;break;}}
    if(!ok)return;
    onSave(out);closeModal();
  };
}

function confirmDel(msg,fn){
  overlay().innerHTML=`<div class="modal" style="max-width:380px"><div class="modal-body" style="padding:26px 24px 6px;text-align:center">

/* ===================== Render router ===================== */
function render(){
  const el=document.getElementById('content');
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  const map={panel:viewPanel,income:viewIncome,expense:viewExpense,subs:viewSubs,debt:viewDebt,invest:viewInvest,goals:viewGoals,budget:viewBudget,reports:viewReports,challenges:viewChallenges,settings:viewSettings};
  el.innerHTML=`<div class="view">${(map[activeView]||viewPanel)()}</div>`;
  const after={panel:afterPanel,reports:afterReports,invest:afterInvest,challenges:afterChallenges}[activeView];
  if(after)after();
  bindCommon();
}
function topbar(title,sub,actionsHtml=''){

    <div class="icon ${hero?'':tint}">${svg(icon)}</div>

    ${meta?`<div class="meta">${meta}</div>`:''}

}

function monthName(ym){const[y,m]=ym.split('-');return new Date(y,m-1,1).toLocaleDateString('tr-TR',{month:'long'});}
/* ===================== Charts ===================== */
function chartColors(){
  const cs=getComputedStyle(document.documentElement);
  return{
    text:cs.getPropertyValue('--dim').trim()||'#97A0B2',
    grid:cs.getPropertyValue('--border').trim()||'rgba(255,255,255,.09)',
    pos:cs.getPropertyValue('--pos').trim(),neg:cs.getPropertyValue('--neg').trim(),
    pri:cs.getPropertyValue('--primary').trim(),pri2:cs.getPropertyValue('--primary-2').trim(),
  };
}
const PIE_PALETTE=['#6E8BFF','#34D399','#FB7185','#FBBF24','#38BDF8','#9D7BFF','#F472B6','#2DD4BF','#FB923C','#A3E635','#818CF8','#F87171','#22D3EE','#C084FC'];
function last6Months(){const a=[];const d=new Date();d.setDate(1);for(let i=5;i>=0;i--){const x=new Date(d.getFullYear(),d.getMonth()-i,1);a.push(`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}`);}return a;}

function afterPanel(){
  if(typeof Chart==='undefined')return;
  Chart.defaults.font.family="Inter";Chart.defaults.font.size=12;
  const c=chartColors();
  const months=last6Months();
  const inc=months.map(mm=>sum(state.incomes.filter(x=>monthOf(x.date)===mm),x=>x.amount));
  const exp=months.map(mm=>sum(state.expenses.filter(x=>monthOf(x.date)===mm),x=>x.amount));
  const labels=months.map(monthName).map(s=>s.slice(0,3));

  const bar=document.getElementById('chBar');
  if(bar)charts.bar=new Chart(bar,{type:'bar',data:{labels,datasets:[
    {label:'Gelir',data:inc,backgroundColor:c.pos,borderRadius:6,maxBarThickness:26},
    {label:'Gider',data:exp,backgroundColor:c.neg,borderRadius:6,maxBarThickness:26}]},
    options:baseOpts(c,true)});

  // pie: this month expenses by category
  const m=curMonth();const byCat={};
  state.expenses.filter(x=>monthOf(x.date)===m).forEach(x=>{byCat[x.category]=(byCat[x.category]||0)+(Number(x.amount)||0);});
  const ent=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const pie=document.getElementById('chPie');
  if(pie){
    if(ent.length)charts.pie=new Chart(pie,{type:'doughnut',data:{labels:ent.map(e=>e[0]),datasets:[{data:ent.map(e=>e[1]),backgroundColor:PIE_PALETTE,borderWidth:0,hoverOffset:6}]},
      options:{cutout:'66%',plugins:{legend:{position:'right',labels:{color:c.text,boxWidth:9,boxHeight:9,padding:9,font:{size:11.5}}},tooltip:tooltipCfg()},maintainAspectRatio:false}});
    else pie.parentElement.innerHTML=`<div class="empty" style="padding:40px">${svg('pie')}<p style="margin-top:8px">Bu ay gider yok</p></div>`;
  }

  // trend: net savings per month
  const trend=document.getElementById('chTrend');
  if(trend)charts.trend=new Chart(trend,{type:'line',data:{labels,datasets:[{label:'Net Tasarruf',data:inc.map((v,i)=>v-exp[i]),borderColor:c.pri,backgroundColor:hexA(c.pri,.12),fill:true,tension:.4,pointRadius:3,pointBackgroundColor:c.pri,borderWidth:2.5}]},
    options:baseOpts(c,false)});
}
function hexA(hex,a){const h=hex.replace('#','');if(h.length<6)return hex;const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return `rgba(${r},${g},${b},${a})`;}
function tooltipCfg(){return{callbacks:{label:ctx=>` ${ctx.dataset.label?ctx.dataset.label+': ':''}${fmt(ctx.parsed.y!==undefined?ctx.parsed.y:ctx.parsed)}`},padding:10,cornerRadius:9,boxPadding:4};}
function baseOpts(c,stacked){return{
  maintainAspectRatio:false,
  plugins:{legend:{display:true,labels:{color:c.text,boxWidth:10,boxHeight:10,usePointStyle:true,padding:14,font:{size:12}}},tooltip:tooltipCfg()},
  scales:{
    x:{grid:{display:false},ticks:{color:c.text},border:{display:false}},
    y:{grid:{color:c.grid},ticks:{color:c.text,callback:v=>fmtShort(v)},border:{display:false}}
  }
};}

}

/* search helpers */
function searchInput(){return `<div class="search-box"><span>${svg('search')}</span><input id="searchInput" placeholder="Ara…" value="${esc(state._q||'')}"></div>`;}
function searchBar(){return `<div class="toolbar">${searchInput()}</div>`;}
function filterByQuery(arr,fields){
  const q=(state._q||'').toLowerCase().trim();if(!q)return arr.slice();
  return arr.filter(x=>fields.some(f=>String(x[f]||'').toLowerCase().includes(q)));
}

function addDays(dateStr,n){const d=new Date(dateStr+'T00:00:00');d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

/* ================================================================
   1) CANLI FİYAT TAKİBİ  (open.er-api.com + api.coingecko.com)
================================================================ */
async function fetchLivePrices(){
  const cur=(state.meta.currency||'TRY').toLowerCase();
  const out={};
  // Döviz: er-api base = uygulama para birimi → rates[X] = 1 birim base kaç X eder
  try{
    const fx=await fetch(`https://open.er-api.com/v6/latest/${cur.toUpperCase()}`).then(r=>r.json());
    if(fx&&fx.rates){
      ['USD','EUR','GBP'].forEach(s=>{const r=fx.rates[s];if(r)out[s]=1/r;}); // 1 USD = (1/rate) base
    }
  }catch(e){}
  // Kripto + altın (pax-gold ≈ 1 ons): coingecko vs uygulama birimi
  try{
    const ids='bitcoin,ethereum,solana,pax-gold';
    const cg=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=${cur}`).then(r=>r.json());
    if(cg){
      if(cg.bitcoin&&cg.bitcoin[cur])out.BTC=cg.bitcoin[cur];
      if(cg.ethereum&&cg.ethereum[cur])out.ETH=cg.ethereum[cur];
      if(cg.solana&&cg.solana[cur])out.SOL=cg.solana[cur];
      if(cg['pax-gold']&&cg['pax-gold'][cur])out.XAU=cg['pax-gold'][cur]/31.1035; // gram altın ≈ ons/31.1
    }
  }catch(e){}
  return Object.keys(out).length?out:null;
}

async function updatePrices(showUi){
  const eligible=state.investments.some(i=>tickerFor(i));
  if(!eligible){ if(showUi)toast('Canlı fiyatı olan varlık yok (döviz/kripto/altın ekle)','err'); return; }
  if(showUi){
    const btn=document.getElementById('priceBtn');
    if(btn){btn.disabled=true;btn.innerHTML=`${svg('refresh')} Güncelleniyor…`;btn.querySelector('svg').style.animation='spin 1s linear infinite';}
  }
  const prices=await fetchLivePrices();
  if(!prices){ if(showUi)toast('Fiyatlar alınamadı, interneti kontrol et','err'); if(showUi)render(); return; }
  LIVE_PRICES=prices; LIVE_AT=Date.now();
  let n=0;
  state.investments.forEach(inv=>{
    const tk=tickerFor(inv);
    if(tk&&prices[tk]){ inv.livePrice=prices[tk]; inv.priceUpdatedAt=LIVE_AT; inv.currentValue=(Number(inv.amount)||0)*prices[tk]; n++; }
  });
  save();
  if(showUi){ toast(`${n} varlık güncellendi`); render(); }
  else if(activeView==='invest'){ render(); }
}

   2) YİNELENEN İŞLEM MOTORU  (uygulama açılışında otomatik üretim)
================================================================ */
function runRecurring(){
  const today=todayStr();
  let created=0;
  const process=(arr,isIncome)=>{
    // şablonları kopyala (döngü sırasında diziye eklerken bozulmasın)
    arr.filter(t=>t.recur&&t.recur!=='none'&&t.recurNext).slice().forEach(t=>{
      let guard=0;
      while(t.recurNext&&t.recurNext<=today&&guard<400){
        guard++;
        const clone=JSON.parse(JSON.stringify(t));
        delete clone.recur; delete clone.recurNext; clone.recurring='Yok';
        clone.id=uid(); clone.date=t.recurNext; clone._gen=true; clone.recurFrom=t.id;
        arr.push(clone); created++;
        t.recurNext=addInterval(t.recurNext,t.recur);
      }
    });
  };
  process(state.incomes,true);
  process(state.expenses,false);
  if(created>0){ state.meta.lastRecurRun=today; save(); setTimeout(()=>{if(typeof toast==='function')toast(`${created} yinelenen işlem otomatik eklendi`);},400); }
}

/* Ücretsiz AI sağlayıcıları: önce kullanıcı Gemini anahtarı (varsa), sonra anahtarsız Pollinations.
   Yalnızca ÖZET sayısal veriler gönderilir — tek tek işlemler, isimler, açıklamalar ASLA gönderilmez. */
async function askFreeAI(messages){
  const key=(state.meta.geminiKey||'').trim();
  if(key){
    try{
      const sys=messages.find(m=>m.role==='system');
      const usr=messages.filter(m=>m.role!=='system').map(m=>m.content).join('\n');
      const body={contents:[{parts:[{text:(sys?sys.content+'\n\n':'')+usr}]}],generationConfig:{temperature:0.7,maxOutputTokens:160}};
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(key)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(r.ok){const d=await r.json();const t=(d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts||[]).map(p=>p.text).join('').trim();if(t)return{text:t,via:'Gemini'};}
    }catch(e){}
  }
  try{
    const r=await fetch('https://text.pollinations.ai/openai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'openai',messages,seed:Math.floor(Math.random()*1e6)})});
    if(r.ok){const d=await r.json();const t=d&&d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content&&d.choices[0].message.content.trim();if(t)return{text:t,via:'Pollinations'};}
  }catch(e){}
  try{
    const prompt=messages.map(m=>m.content).join('\n');
    const r=await fetch('https://text.pollinations.ai/'+encodeURIComponent(prompt)+'?model=openai');
    if(r.ok){const t=(await r.text()).trim();if(t&&t.length<1500)return{text:t,via:'Pollinations'};}
  }catch(e){}
  return null;
}

  return {m,topCat:top[0]?top[0][0]:'—',topCatVal:top[0]?top[0][1]:0,subTot,cur:state.meta.currency};

  const {m,topCat,topCatVal,subTot}=aiSummary();

  if(m.savingRate<0) tips.push('Bu ay giderin gelirini aşıyor; öncelik açığı kapatmak — en büyük 2 kategoride kısıntı yap.');

  if(subTot>0) tips.push(`Aboneliklerin aylık ${fmt(subTot)} (yıllık ${fmt(subTot*12)}). Kullanmadıklarını iptal et.`);
  if(m.debtOwe>0) tips.push(`Açık borcun ${fmt(m.debtOwe)}; en yüksek faizliyi önce kapatmak toplam maliyeti düşürür.`);

  return tips.slice(0,5);

/* ================================================================
   4) QR + ŞİFRELİ WebRTC SENKRONİZASYON  (PeerJS + qrcode-generator)
================================================================ */
let _peer=null;
function killPeer(){try{if(_peer){_peer.destroy();}}catch(e){}_peer=null;}
function exportState(){const{meta,incomes,expenses,subscriptions,debts,investments,goals,budgets,tags,challenges,badges}=state;return{meta,incomes,expenses,subscriptions,debts,investments,goals,budgets,tags,challenges,badges};}
function b64(buf){let s='';const b=new Uint8Array(buf);for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}
function ub64(str){const s=atob(str);const b=new Uint8Array(s.length);for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b;}
async function deriveKey(pin,salt){const enc=new TextEncoder();const km=await crypto.subtle.importKey('raw',enc.encode(pin),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encJSON(obj,pin){const salt=crypto.getRandomValues(new Uint8Array(16));const iv=crypto.getRandomValues(new Uint8Array(12));const key=await deriveKey(pin,salt);const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj)));return{s:b64(salt),i:b64(iv),c:b64(ct)};}
async function decJSON(pl,pin){const key=await deriveKey(pin,ub64(pl.s));const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:ub64(pl.i)},key,ub64(pl.c));return JSON.parse(new TextDecoder().decode(pt));}
function qrSvg(text){ if(typeof qrcode==='undefined')return '<p style="color:var(--faint);font-size:12px">QR kütüphanesi yüklenemedi</p>'; const qr=qrcode(0,'M'); qr.addData(text); qr.make(); return qr.createSvgTag({cellSize:4,margin:2,scalable:true}); }
function syncModalShell(title,inner){
  overlay().innerHTML=`<div class="modal"><div class="modal-head"><h3>${svg('qr')} ${esc(title)}</h3><button class="icon-btn" id="mClose">${svg('x')}</button></div><div class="modal-body" id="syncBody">${inner}</div></div>`;
  overlay().classList.add('open');
  document.getElementById('mClose').onclick=()=>{killPeer();closeModal();};
}
function syncSend(){
  if(typeof Peer==='undefined'){toast('Senkronizasyon kütüphanesi yüklenemedi (internet gerekir)','err');return;}
  killPeer();
  const pin=String(Math.floor(100000+Math.random()*900000));
  syncModalShell('Veri Gönder',`<div class="ai-load"><div class="spinner"></div><p>Bağlantı kuruluyor…</p></div>`);
  _peer=new Peer();
  _peer.on('open',id=>{
    const body=document.getElementById('syncBody'); if(!body)return;
    body.innerHTML=`
      <div class="qr-box">${qrSvg(id)}</div>
      <div class="sync-codes">
        <div><span>Cihaz Kodu</span><b class="num">${esc(id)}</b></div>
        <div><span>Şifre (PIN)</span><b class="num">${esc(pin)}</b></div>
      </div>
      <p style="font-size:13px;color:var(--dim);text-align:center;margin-top:8px">Diğer cihazda <b>Veri Al</b>'a girip bu kodu ve PIN'i yaz. Aktarım uçtan uca şifrelidir, hiçbir veri buluta gitmez.</p>
      <div id="syncState" class="sync-state">Karşı cihaz bekleniyor…</div>`;
    _peer.on('connection',conn=>{
      conn.on('open',async()=>{
        const st=document.getElementById('syncState'); if(st){st.className='sync-state';st.textContent='Cihaz bağlandı, şifreli veri gönderiliyor…';}
        try{
          const payload=await encJSON(exportState(),pin);
          conn.send(payload);
          setTimeout(()=>{const s2=document.getElementById('syncState');if(s2){s2.className='sync-state ok';s2.innerHTML=`${svg('check')} Veri gönderildi. Diğer cihazda onayla.`;}},300);
        }catch(e){const s2=document.getElementById('syncState');if(s2){s2.className='sync-state err';s2.textContent='Gönderim hatası.';}}
      });
    });
  });
  _peer.on('error',err=>{const st=document.getElementById('syncState')||document.getElementById('syncBody');if(st)st.innerHTML=`<div class="sync-state err">Bağlantı hatası: ${esc(err.type||'bilinmiyor')}</div>`;});
}
function syncReceive(){
  if(typeof Peer==='undefined'){toast('Senkronizasyon kütüphanesi yüklenemedi (internet gerekir)','err');return;}
  syncModalShell('Veri Al',`
    <div class="field"><label>Karşı Cihaz Kodu</label><input id="rxId" placeholder="Diğer cihazdaki kod" autocomplete="off"></div>
    <div class="field"><label>Şifre (PIN)</label><input id="rxPin" placeholder="6 haneli PIN" inputmode="numeric" autocomplete="off"></div>
    <button class="btn btn-primary" id="rxGo" style="width:100%;justify-content:center">${svg('download')} Bağlan ve Al</button>
    <div id="syncState" class="sync-state" style="display:none"></div>`);
  document.getElementById('rxGo').onclick=()=>{
    const id=document.getElementById('rxId').value.trim();
    const pin=document.getElementById('rxPin').value.trim();
    if(!id||!pin){toast('Kod ve PIN gerekli','err');return;}
    const st=document.getElementById('syncState'); st.style.display='block'; st.className='sync-state'; st.textContent='Bağlanılıyor…';
    killPeer(); _peer=new Peer();
    _peer.on('open',()=>{
      const conn=_peer.connect(id,{reliable:true});
      conn.on('open',()=>{st.textContent='Bağlandı, veri bekleniyor…';});
      conn.on('data',async payload=>{
        try{
          const data=await decJSON(payload,pin);
          confirmImport(data);
        }catch(e){ st.className='sync-state err'; st.textContent='PIN yanlış veya veri çözülemedi.'; }
      });
      conn.on('error',()=>{st.className='sync-state err';st.textContent='Veri kanalı hatası.';});
    });
    _peer.on('error',err=>{st.className='sync-state err';st.textContent='Bağlantı hatası: '+(err.type||'bilinmiyor');});
  };
}

function shouldIBuy(amount,label){
  if(!amount||amount<=0){toast('Önce bir tutar gir','err');return;}
  const m=metrics();
  const dailySave=m.saving/30;
  const incShare=m.mIn>0?amount/m.mIn*100:0;
  const active=state.goals.filter(g=>(Number(g.current)||0)<(Number(g.target)||0));
  let goalsHtml='';
  if(active.length&&dailySave>0){
    goalsHtml=active.slice(0,3).map(g=>{
      const delay=Math.ceil(amount/dailySave);
      return `<div class="row" style="padding:10px 0;border-color:var(--border)"><div class="av tint-warn" style="width:32px;height:32px">${g.emoji||'🎯'}</div>

  else if(incShare>30){verdict=`Bu harcama aylık gelirinin %${incShare.toFixed(0)}'i kadar — büyük bir kalem. Gerçekten gerekli mi?`;vclass='tint-warn';vicon='🤔';}
  else if(dailySave<=0){verdict='Şu an net tasarrufun yok; bu harcama için önce gelir-gider dengesine bakmak iyi olur.';vclass='tint-warn';vicon='🤔';}
  else{verdict=`Tasarruf hızına göre bu harcamayı ${Math.ceil(amount/dailySave)} günde geri kazanırsın. Sınırların içindeyse alabilirsin.`;vclass='tint-pos';vicon='✅';}
  overlay().innerHTML=`<div class="modal"><div class="modal-head"><h3>${svg('cart')} Bunu almalı mıyım?</h3><button class="icon-btn" id="mClose">${svg('x')}</button></div>

        <div><span>Aylık gelirin %</span><b>%${incShare.toFixed(0)}</b></div>

        <div><span>Günlük tasarruf</span><b>${fmt(Math.max(0,dailySave))}</b></div>

}

const CHALLENGE_TEMPLATES=[
  {key:'zeroToday',icon:'🚫',title:'Bugün Sıfır Harcama',desc:'Bugün hiç harcama yapma.',days:1,badge:'Tutumlu Gün'},
  {key:'noEatOut3',icon:'🍳',title:'3 Gün Dışarıdan Yememe',desc:'3 gün Restoran/Kafe/Yemek harcaması yapma.',days:3,badge:'Ev Şefi'},
  {key:'noEatOut7',icon:'👨‍🍳',title:'7 Gün Dışarıdan Yememe',desc:'1 hafta dışarıda yeme harcaması yapma.',days:7,badge:'Mutfak Ustası'},
  {key:'underBudget',icon:'🎯',title:'Hafta Disiplini',desc:'7 gün boyunca günlük ortalama gideri 500\u00A0₺ altında tut.',days:7,badge:'Disiplinli',limit:500},
];
function isEatOut(x){return ['Restoran','Kafe','Yemek'].includes(x.category);}
function chViolated(ch){
  const end=addDays(ch.start,ch.days);
  const within=state.expenses.filter(x=>x.date>=ch.start&&x.date<end);
  if(ch.key==='zeroToday')return within.length>0;
  if(ch.key.startsWith('noEatOut'))return within.some(isEatOut);
  if(ch.key==='underBudget')return sum(within,x=>x.amount)>(ch.limit*ch.days);
  return false;
}
function awardBadge(title,icon){
  const today=todayStr();
  if(state.badges.some(b=>b.title===title))return; // her rozet bir kez
  state.badges.push({id:uid(),title,icon,date:today});
}
function evalChallenges(){
  const today=todayStr();let changed=false;
  state.challenges.forEach(ch=>{
    if(ch.status!=='active')return;
    if(chViolated(ch)){ch.status='failed';changed=true;return;}
    if(today>=addDays(ch.start,ch.days)){ch.status='done';awardBadge(ch.badge,ch.icon);changed=true;}
  });
  if(changed)save();
}
function startChallenge(key){
  const t=CHALLENGE_TEMPLATES.find(x=>x.key===key);if(!t)return;
  if(state.challenges.some(c=>c.key===key&&c.status==='active')){toast('Bu meydan okuma zaten aktif','err');return;}
  state.challenges.push({id:uid(),key,title:t.title,icon:t.icon,desc:t.desc,days:t.days,limit:t.limit||0,badge:t.badge,start:todayStr(),status:'active'});
  save();render();toast('Meydan okuma başladı! 💪');
}
function cancelChallenge(id){state.challenges=state.challenges.filter(c=>c.id!==id);save();render();toast('Meydan okuma bırakıldı');}
function checkInChallenge(id){
  const ch=state.challenges.find(c=>c.id===id);if(!ch||ch.status!=='active')return;
  if(chViolated(ch)){ch.status='failed';save();render();toast('Maalesef bu meydan okuma bozuldu','err');return;}
  // Tek günlük "sıfır harcama": gün içinde harcama yoksa elle tamamla
  if(ch.key==='zeroToday'){ch.status='done';awardBadge(ch.badge,ch.icon);save();render();toast('Tebrikler! Rozet kazandın 🏅');return;}
  const left=Math.max(0,(new Date(addDays(ch.start,ch.days))-new Date(todayStr()))/864e5);
  if(left<=0){ch.status='done';awardBadge(ch.badge,ch.icon);save();render();toast('Tamamlandı! Rozet kazandın 🏅');}
  else toast(`Şu ana kadar temiz — ${Math.ceil(left)} gün kaldı`);
}

        :`<div class="card">${emptyState('Henüz rozet yok','Bir meydan okuma tamamla, ilk rozetini kazan')}</div>`}
      ${past.length?`<p style="font-size:12px;font-weight:650;color:var(--dim);margin:18px 0 8px">Geçmiş görevler</p>
        <div class="card list">${past.map(c=>`<div class="row"><div class="av ${c.status==='done'?'tint-pos':'tint-neg'}" style="font-size:16px">${c.icon}</div>

    </div>`;

            <div class="rmain"><div class="rtitle">${esc(c)}</div><div class="rsub"><span>%${(v/tOut*100).toFixed(1)} · ${exp.filter(e=>e.category===c).length} işlem</span></div></div>
            <div class="ramt">${fmt(v)}</div></div>`).join(''):emptyState('Veri yok')}</div>
       </div>
     </div>`;
}
function afterReports(){
  if(typeof Chart==='undefined')return;const c=chartColors();
  const range=state._repRange||'month';let from;const now=new Date();
  from = range==='month'?new Date(now.getFullYear(),now.getMonth(),1):range==='year'?new Date(now.getFullYear(),0,1):new Date(2000,0,1);
  const fromS=`${from.getFullYear()}-${String(from.getMonth()+1).padStart(2,'0')}-01`;
  const byCat={};state.expenses.filter(x=>x.date>=fromS).forEach(x=>{byCat[x.category]=(byCat[x.category]||0)+(Number(x.amount)||0);});
  const ent=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const el=document.getElementById('chRepCat');if(!el)return;
  if(!ent.length){el.parentElement.innerHTML=`<div class="empty" style="padding:50px">${svg('pie')}<p style="margin-top:8px">Bu dönemde gider yok</p></div>`;return;}
  charts.repCat=new Chart(el,{type:'bar',data:{labels:ent.map(e=>e[0]),datasets:[{data:ent.map(e=>e[1]),backgroundColor:ent.map((e,i)=>PIE_PALETTE[i%PIE_PALETTE.length]),borderRadius:6}]},
    options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:tooltipCfg()},
      scales:{x:{grid:{color:c.grid},ticks:{color:c.text,callback:v=>fmtShort(v)},border:{display:false}},y:{grid:{display:false},ticks:{color:c.text},border:{display:false}}}}});
}

/* ===================== Export ===================== */
function dl(name,blob){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);}
function toCSV(rows){return rows.map(r=>r.map(c=>{const s=String(c==null?'':c);return /[",\n;]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(';')).join('\n');}
function exportCSV(){
  const rows=[['Tür','Başlık','Kategori','Tutar','Tarih','Yöntem','Not']];
  state.incomes.forEach(x=>rows.push(['Gelir',x.name,x.category,x.amount,x.date,'',x.note||'']));
  state.expenses.forEach(x=>rows.push(['Gider',x.title,x.category,x.amount,x.date,x.method||'',x.note||'']));
  dl('finans_islemler.csv',new Blob(['\ufeff'+toCSV(rows)],{type:'text/csv;charset=utf-8'}));
  toast('CSV indirildi');
}
function exportExcel(){
  if(typeof XLSX==='undefined'){toast('Excel kütüphanesi yüklenemedi','err');return;}
  const wb=XLSX.utils.book_new();
  const add=(name,arr,cols)=>{if(!arr.length)return;XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(arr.map(cols)),name);};
  add('Gelirler',state.incomes,x=>({Ad:x.name,Kategori:x.category,Tutar:x.amount,Tarih:x.date,Tekrar:x.recurring,Not:x.note}));
  add('Giderler',state.expenses,x=>({Başlık:x.title,Kategori:x.category,Tutar:x.amount,Tarih:x.date,Saat:x.time,Yöntem:x.method,Etiket:(x.tags||[]).join(','),Not:x.note}));
  add('Abonelikler',state.subscriptions,x=>({Hizmet:x.name,Tutar:x.amount,Periyot:x.cycle,Yenilenme:x.renewDate}));
  add('Borç-Alacak',state.debts,x=>({Tür:x.kind,Kişi:x.person,Tutar:x.amount,Ödenen:x.paid,Kalan:x.amount-(x.paid||0),Vade:x.dueDate}));
  add('Yatırımlar',state.investments,x=>({Tür:x.type,Miktar:x.amount,AlışFiyatı:x.buyPrice,GüncelDeğer:x.currentValue,KarZarar:x.currentValue-x.buyPrice*x.amount}));
  add('Hedefler',state.goals,x=>({Hedef:x.name,Tutar:x.target,Mevcut:x.current,Yüzde:x.target>0?Math.round(x.current/x.target*100)+'%':''}));
  if(!wb.SheetNames.length){toast('Aktarılacak veri yok','err');return;}
  XLSX.writeFile(wb,'finans_raporu.xlsx');toast('Excel indirildi');
}
function backup(){
  dl('harcana_yedek_'+todayStr()+'.json',new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  toast('Yedek indirildi');
}
function restore(file){
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d||typeof d!=='object')throw 0;
    state=Object.assign({incomes:[],expenses:[],subscriptions:[],debts:[],investments:[],goals:[],budgets:[],tags:[]},d);
    state.meta=Object.assign({currency:'TRY',theme:'dark',name:''},d.meta||{});
    save();applyTheme();render();renderNav();toast('Yedek geri yüklendi');
  }catch(e){toast('Geçersiz yedek dosyası','err');}};
  r.readAsText(file);
}

/* ===================== Theme ===================== */
function applyTheme(){
  document.documentElement.classList.toggle('light',state.meta.theme==='light');
  document.getElementById('themeLabel').textContent=state.meta.theme==='light'?'Açık Tema':'Koyu Tema';
  document.getElementById('themeToggleM').innerHTML=svg(state.meta.theme==='light'?'moon':'sun');
  const tc=document.querySelector('meta[name=theme-color]');if(tc)tc.content=state.meta.theme==='light'?'#EEF1FA':'#070811';
}
function toggleTheme(){state.meta.theme=state.meta.theme==='light'?'dark':'light';applyTheme();save();render();}

/* ===================== Common bindings ===================== */
const FORMS={income:incomeForm,expense:expenseForm,sub:subForm,debt:debtForm,invest:investForm,goal:goalForm,budget:budgetForm};
const STORES={income:'incomes',expense:'expenses',sub:'subscriptions',debt:'debts',invest:'investments',goal:'goals',budget:'budgets'};
function bindCommon(){
  const add=document.getElementById('addBtn');
  if(add)add.onclick=()=>{
    if(activeView==='income')incomeForm();
    else if(activeView==='expense')expenseForm();
    else if(activeView==='subs')subForm();
    else if(activeView==='debt')debtForm(null,state._debtTab||'borc');
    else if(activeView==='invest')investForm();
    else if(activeView==='goals')goalForm();
    else if(activeView==='budget')budgetForm();
  };
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{
    const t=b.getAttribute('data-edit'),id=b.getAttribute('data-id');
    const rec=state[STORES[t]].find(x=>x.id===id);if(rec)FORMS[t](rec);
  });
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    const t=b.getAttribute('data-del'),id=b.getAttribute('data-id');
    confirmDel('Bu kayıt kalıcı olarak silinecek.',()=>{state[STORES[t]]=state[STORES[t]].filter(x=>x.id!==id);save();render();toast('Silindi');});
  });
  document.querySelectorAll('[data-view]').forEach(b=>{if(!b.closest('.nav')&&!b.closest('.mobile-bar'))b.onclick=()=>go(b.getAttribute('data-view'));});
  const si=document.getElementById('searchInput');
  if(si)si.oninput=()=>{state._q=si.value;const v=activeView;clearTimeout(state._st);state._st=setTimeout(()=>{render();const n=document.getElementById('searchInput');if(n){n.focus();n.setSelectionRange(n.value.length,n.value.length);}},220);};
  const cf=document.getElementById('catFilter');if(cf)cf.onchange=()=>{state._catFilter=cf.value;render();};
  document.querySelectorAll('[data-debttab]').forEach(b=>b.onclick=()=>{state._debtTab=b.getAttribute('data-debttab');render();});
  document.querySelectorAll('[data-rep]').forEach(b=>b.onclick=()=>{state._repRange=b.getAttribute('data-rep');render();});
  const ai=document.getElementById('aiBtn');if(ai)ai.onclick=localAI;
  // reports export
  bindIf('exCsv',exportCSV);bindIf('exExcel',exportExcel);bindIf('exPdf',()=>window.print());
  // investments: live price refresh
  bindIf('priceBtn',()=>updatePrices(true));
  // settings: local AI + P2P sync
  bindIf('localAiBtn',localAI);
  bindIf('saveGemini',()=>{const k=document.getElementById('setGemini').value.trim();state.meta.geminiKey=k;save();toast(k?'Gemini anahtarı kaydedildi':'Anahtarsız ücretsiz AI kullanılacak');});
  bindIf('syncSendBtn',syncSend);
  bindIf('syncRecvBtn',syncReceive);
  // challenges
  document.querySelectorAll('[data-startch]').forEach(b=>b.onclick=()=>startChallenge(b.getAttribute('data-startch')));
  document.querySelectorAll('[data-cancelch]').forEach(b=>b.onclick=()=>cancelChallenge(b.getAttribute('data-cancelch')));
  document.querySelectorAll('[data-checkch]').forEach(b=>b.onclick=()=>checkInChallenge(b.getAttribute('data-checkch')));
  // settings
  bindIf('saveProfile',()=>{const n=document.getElementById('setName').value;const c=document.getElementById('setCur').value;state.meta.name=n;state.meta.currency=c;save();render();toast('Profil kaydedildi');});
  bindIf('backupBtn',backup);bindIf('exAllBtn',exportExcel);
  bindIf('restoreBtn',()=>document.getElementById('restoreFile').click());
  const rf=document.getElementById('restoreFile');if(rf)rf.onchange=()=>{if(rf.files[0])restore(rf.files[0]);};
  bindIf('setTheme',toggleTheme);
  bindIf('wipeBtn',()=>confirmDel('TÜM finansal verin silinecek. Bu işlem geri alınamaz!',()=>{
    const cur=state.meta;state={meta:cur,incomes:[],expenses:[],subscriptions:[],debts:[],investments:[],goals:[],budgets:[],tags:['İş','Ev','Tatil','Sağlık','Çocuk'],challenges:[],badges:[]};save();render();renderNav();toast('Tüm veri silindi');}));
}
function bindIf(id,fn){const e=document.getElementById(id);if(e)e.onclick=fn;}

/* ===================== Init ===================== */
async function init(){
  await load();
  runRecurring();        // otomasyon: tarihi gelmiş yinelenen işlemleri üret
  evalChallenges();      // meydan okumaları değerlendir / rozet ver
  document.getElementById('themeToggle').onclick=toggleTheme;
  document.getElementById('themeToggleM').onclick=toggleTheme;
  applyTheme();renderNav();render();
  // Sayfa yüklenince yatırım fiyatlarını arka planda sessizce güncelle
  if(state.investments.some(i=>tickerFor(i))) updatePrices(false);
}
/* ===================== Boot ===================== */
window.__bootApp=function(){ if(window.__booted)return; window.__booted=true; init(); };
// Kütüphaneler hazırsa hemen başlat; değilse yükleyici bitince __bootApp çağıracak.
if(window.__libsReady){ window.__bootApp(); }
// Güvenlik ağı: ne olursa olsun en geç DOMContentLoaded + 5sn'de UI'yı başlat (donma olmasın).
document.addEventListener('DOMContentLoaded',function(){ setTimeout(function(){ if(!window.__booted) window.__bootApp(); },5000); });
